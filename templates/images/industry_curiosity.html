<!--
  industry_curiosity.html
  ────────────────────────────────────────────────────────────────
  True Aim · Image template · Industry Curiosity archetype
  Render target: HTMLCSStoImage at 1080×1080
  Brand authority: brand.yaml + voice.yaml + vocabulary.yaml

  Placeholders substituted by n8n Code node before POST to HCTI:
    {{HEADLINE_LINE_1}}   Title-case statement, ends with period
    {{HEADLINE_LINE_2}}   Title-case reinforcement (may be empty)
    {{POST_ID}}           e.g. "IC-W15"
    {{COMPOSITION_MOTIF}} one of the archetype's registered motifs
    {{VERSION_TAG}}       e.g. "v1.0"
    {{OWL_URL}}           URL to True Aim owl webp/png (transparent bg)
    {{WORDMARK_URL}}      URL to True Aim wordmark webp/png (transparent bg)

  Composition discipline: one motif per canvas, 70%+ negative space.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0b0c15;
    --bg-secondary: #12141d;
    --text:         #ffffff;
    --text-soft:    #ffffffb3;
    --text-muted:   #ffffff99;
    --accent:       #2563eb;
    --accent-soft:  #2563eb4d;
    --hairline:     #ffffff14;
    --pad:          60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .canvas {
    position: relative;
    width: 1080px; height: 1080px;
    background: var(--bg);
  }
  .motif {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  
  /* ─── Motif: hairline_observation ─── */

    .motif.hairline_observation .baseline {
      position: absolute; top: 50%; left: 200px; right: 200px;
      height: 0.5px; background: #ffffff14;
    }
    .motif.hairline_observation .point {
      position: absolute;
      top: calc(50% - 4px);
      left: calc(200px + (1080px - 400px) * 0.7 - 4px);
      width: 8px; height: 8px; border-radius: 50%;
      background: #2563eb;
      box-shadow: 0 0 0 6px #2563eb1f;
    }
    .motif.hairline_observation .point-label {
      position: absolute;
      top: calc(50% - 22px);
      left: calc(200px + (1080px - 400px) * 0.7 - 30px);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: #2563eb;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    
  /* ─── Motif: divergence_pair ─── */

    .motif.divergence_pair .line-a, .motif.divergence_pair .line-b {
      position: absolute; height: 0.5px;
      background: #ffffff14; transform-origin: left center;
    }
    .motif.divergence_pair .line-a {
      top: calc(50% - 60px); left: 280px; width: 480px;
      transform: rotate(-0.6deg);
    }
    .motif.divergence_pair .line-b {
      top: calc(50% + 60px); left: 280px; width: 480px;
      transform: rotate(0.6deg);
    }
    .motif.divergence_pair .point {
      position: absolute;
      top: calc(50% - 4px); left: 754px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #2563eb;
      box-shadow: 0 0 0 6px #2563eb1f;
    }
    
  /* ─── Motif: single_point_off_baseline ─── */

    .motif.single_point_off_baseline .baseline {
      position: absolute; top: calc(50% + 30px);
      left: 200px; right: 200px;
      height: 0.5px; background: #ffffff14;
    }
    .motif.single_point_off_baseline .point {
      position: absolute;
      top: calc(50% - 50px); left: calc(50% - 4px);
      width: 8px; height: 8px; border-radius: 50%;
      background: #2563eb;
      box-shadow: 0 0 0 6px #2563eb1f;
    }
    .motif.single_point_off_baseline .leader {
      position: absolute;
      top: calc(50% - 42px); left: calc(50% - 0.25px);
      width: 0.5px; height: 72px; background: #ffffff14;
    }
    
  /* Hide all motif variants by default */
  .motif .motif-variant { display: none; }
  .motif.hairline_observation .motif-variant.hairline_observation { display: block; }
  .motif.divergence_pair .motif-variant.divergence_pair { display: block; }
  .motif.single_point_off_baseline .motif-variant.single_point_off_baseline { display: block; }


  .bracket {
    position: absolute; width: 14px; height: 14px;
    border: 0.5px solid var(--accent-soft);
    pointer-events: none;
  }
  .bracket.tr { top: 24px; right: 24px; border-bottom: none; border-left: none; }
  .bracket.br { bottom: 24px; right: 24px; border-top: none; border-left: none; }

  .meta-top {
    position: absolute;
    top: var(--pad); right: var(--pad);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .logo-lockup {
    position: absolute;
    top: var(--pad); left: var(--pad);
    display: flex; align-items: center; gap: 16px;
    z-index: 3;
  }
  .logo-lockup .owl { height: 64px; width: auto; }
  .logo-lockup .wordmark { height: 30px; width: auto; }

  .gradient {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 540px;
    background: linear-gradient(180deg, #0b0c1500 0%, #0b0c15ee 100%);
    pointer-events: none;
    z-index: 4;
  }

  .headline {
    position: absolute;
    left: var(--pad); right: var(--pad);
    bottom: 110px;
    z-index: 5;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1.04;
    letter-spacing: -1.6px;
    color: var(--text);
  }
  .headline .line-1,
  .headline .line-2 {
    display: block;
    white-space: nowrap;    /* critical: prevents wrap so we can measure */
    overflow: hidden;
  }
  .headline .line-2 {
    color: var(--text-soft);
    margin-top: 4px;
  }

  .meta-bot {
    position: absolute;
    bottom: var(--pad); left: var(--pad); right: var(--pad);
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">

  <div class="meta-top">TA · IC · {{POST_ID}}</div>

  <div class="logo-lockup">
    <img class="owl" src="{{OWL_URL}}" alt="">
    <img class="wordmark" src="{{WORDMARK_URL}}" alt="True Aim">
  </div>

  <div class="motif {{COMPOSITION_MOTIF}}">
    <!-- motif: hairline_observation (only renders when COMPOSITION_MOTIF=hairline_observation) -->
    <div class="motif-variant hairline_observation">
    
    <div class="baseline"></div>
    <div class="point"></div>
    <div class="point-label">Observed</div>
        </div>

    <!-- motif: divergence_pair (only renders when COMPOSITION_MOTIF=divergence_pair) -->
    <div class="motif-variant divergence_pair">
    
    <div class="line-a"></div>
    <div class="line-b"></div>
    <div class="point"></div>
        </div>

    <!-- motif: single_point_off_baseline (only renders when COMPOSITION_MOTIF=single_point_off_baseline) -->
    <div class="motif-variant single_point_off_baseline">
    
    <div class="baseline"></div>
    <div class="leader"></div>
    <div class="point"></div>
        </div>

  </div>

  <div class="bracket tr"></div>
  <div class="bracket br"></div>

  <div class="gradient"></div>

  <div class="headline">
    <span class="line-1">{{HEADLINE_LINE_1}}</span>
    <span class="line-2">{{HEADLINE_LINE_2}}</span>
  </div>

  <div class="meta-bot">
    <span>{{POST_ID}} · INDUSTRY CURIOSITY</span>
    <span>{{VERSION_TAG}}</span>
  </div>

</div>

<script>
  // Headline auto-fit: if a line is wider than the available width at 64px,
  // scale font-size down proportionally until it fits. Keeps both lines
  // sized consistently (whichever needs shrinking more wins).
  (function autoFitHeadline() {
    var headline = document.querySelector('.headline');
    if (!headline) return;
    var lines = headline.querySelectorAll('.line-1, .line-2');
    var maxSize = 64;      // px — brand default
    var minSize = 40;      // px — floor, below this shrink the canvas instead
    var availableWidth = headline.clientWidth;  // container width minus padding
    var fitSize = maxSize;

    lines.forEach(function(line) {
      if (!line.textContent.trim()) return;
      // Temporarily remove overflow:hidden so we can measure true scrollWidth
      var originalOverflow = line.style.overflow;
      line.style.overflow = 'visible';
      var needed = line.scrollWidth;
      line.style.overflow = originalOverflow;
      if (needed > availableWidth) {
        var ratio = availableWidth / needed;
        var candidate = Math.floor(maxSize * ratio);
        if (candidate < fitSize) fitSize = candidate;
      }
    });

    fitSize = Math.max(minSize, Math.min(maxSize, fitSize));
    headline.style.fontSize = fitSize + 'px';
    // Proportionally adjust letter-spacing to keep tracking tight
    var spacing = -1.6 * (fitSize / maxSize);
    headline.style.letterSpacing = spacing.toFixed(2) + 'px';
  })();
</script>

</body>
</html>
