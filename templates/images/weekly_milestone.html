<!--
  weekly_milestone.html
  ────────────────────────────────────────────────────────────────
  True Aim · Image template · Weekly Milestone archetype
  Render target: HTMLCSStoImage at 1080×1080
  Brand authority: brand.yaml + voice.yaml + vocabulary.yaml

  Placeholders substituted by n8n Code node before POST to HCTI:
    {{HEADLINE_LINE_1}}   Title-case statement, ends with period
    {{HEADLINE_LINE_2}}   Title-case reinforcement (may be empty)
    {{POST_ID}}           e.g. "WM-W15"
    {{COMPOSITION_MOTIF}} one of the archetype's registered motifs
    {{VERSION_TAG}}       e.g. "v1.0"
    {{OWL_URL}}           URL to True Aim owl webp/png (transparent bg)
    {{WORDMARK_URL}}      URL to True Aim wordmark webp/png (transparent bg)

  Composition discipline: one motif per canvas, 70%+ negative space.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0b0c15;
    --bg-secondary: #12141d;
    --text:         #ffffff;
    --text-soft:    #ffffffb3;
    --text-muted:   #ffffff99;
    --accent:       #22c55e;
    --accent-soft:  #22c55e4d;
    --hairline:     #ffffff14;
    --pad:          60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .canvas {
    position: relative;
    width: 1080px; height: 1080px;
    background: var(--bg);
  }
  .motif {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  
  /* ─── Motif: ascending_bars ─── */

    .motif.ascending_bars .bar {
      position: absolute; width: 10px;
      background: #ffffff2a; bottom: calc(50% - 100px);
    }
    .motif.ascending_bars .bar-1 { left: calc(50% - 140px); height: 30px; }
    .motif.ascending_bars .bar-2 { left: calc(50% - 100px); height: 50px; }
    .motif.ascending_bars .bar-3 { left: calc(50% - 60px);  height: 75px; }
    .motif.ascending_bars .bar-4 { left: calc(50% - 20px);  height: 100px; }
    .motif.ascending_bars .bar-5 { left: calc(50% + 20px);  height: 130px; }
    .motif.ascending_bars .bar-6 { left: calc(50% + 60px);  height: 160px; }
    .motif.ascending_bars .bar-7 {
      left: calc(50% + 100px); height: 200px;
      background: #22c55e;
      box-shadow: 0 0 24px #22c55e33;
    }
    .motif.ascending_bars .baseline {
      position: absolute; top: calc(50% + 100px);
      left: calc(50% - 160px); width: 280px;
      height: 0.5px; background: #ffffff14;
    }
    
  /* ─── Motif: threshold_line ─── */

    .motif.threshold_line .threshold {
      position: absolute; top: 50%;
      left: 200px; right: 200px;
      height: 0.5px; background: #ffffff2a;
    }
    .motif.threshold_line .crossing {
      position: absolute; left: calc(50% + 80px);
      top: calc(50% - 100px);
      width: 8px; height: 200px;
      background: linear-gradient(
        to bottom,
        #ffffff2a 0%,
        #ffffff2a 50%,
        #22c55e 50%,
        #22c55e 100%
      );
    }
    .motif.threshold_line .point {
      position: absolute;
      top: calc(50% - 4px); left: calc(50% + 80px);
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 6px #22c55e1f;
    }
    
  /* ─── Motif: marker_progression ─── */

    .motif.marker_progression .prog-dot {
      position: absolute; top: calc(50% - 2px);
      width: 4px; height: 4px; border-radius: 50%;
      background: #ffffff33;
    }
    .motif.marker_progression .pd-1 { left: 340px; }
    .motif.marker_progression .pd-2 { left: 375px; }
    .motif.marker_progression .pd-3 { left: 415px; }
    .motif.marker_progression .pd-4 { left: 460px; }
    .motif.marker_progression .pd-5 { left: 515px; }
    .motif.marker_progression .pd-6 { left: 580px; }
    .motif.marker_progression .pd-7 { left: 660px; }
    .motif.marker_progression .point {
      position: absolute;
      top: calc(50% - 5px); left: 760px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 8px #22c55e1f;
    }
    
  /* Hide all motif variants by default */
  .motif .motif-variant { display: none; }
  .motif.ascending_bars .motif-variant.ascending_bars { display: block; }
  .motif.threshold_line .motif-variant.threshold_line { display: block; }
  .motif.marker_progression .motif-variant.marker_progression { display: block; }


  .bracket {
    position: absolute; width: 14px; height: 14px;
    border: 0.5px solid var(--accent-soft);
    pointer-events: none;
  }
  .bracket.tr { top: 24px; right: 24px; border-bottom: none; border-left: none; }
  .bracket.br { bottom: 24px; right: 24px; border-top: none; border-left: none; }

  .meta-top {
    position: absolute;
    top: var(--pad); right: var(--pad);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .logo-lockup {
    position: absolute;
    top: var(--pad); left: var(--pad);
    display: flex; align-items: center; gap: 16px;
    z-index: 3;
  }
  .logo-lockup .owl { height: 64px; width: auto; }
  .logo-lockup .wordmark { height: 30px; width: auto; }

  .gradient {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 540px;
    background: linear-gradient(180deg, #0b0c1500 0%, #0b0c15ee 100%);
    pointer-events: none;
    z-index: 4;
  }

  .headline {
    position: absolute;
    left: var(--pad); right: var(--pad);
    bottom: 110px;
    z-index: 5;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1.04;
    letter-spacing: -1.6px;
    color: var(--text);
  }
  .headline .line-1,
  .headline .line-2 {
    display: block;
    white-space: nowrap;    /* critical: prevents wrap so we can measure */
    overflow: hidden;
  }
  .headline .line-2 {
    color: var(--text-soft);
    margin-top: 4px;
  }

  .meta-bot {
    position: absolute;
    bottom: var(--pad); left: var(--pad); right: var(--pad);
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">

  <div class="meta-top">TA · WM · {{POST_ID}}</div>

  <div class="logo-lockup">
    <img class="owl" src="{{OWL_URL}}" alt="">
    <img class="wordmark" src="{{WORDMARK_URL}}" alt="True Aim">
  </div>

  <div class="motif {{COMPOSITION_MOTIF}}">
    <!-- motif: ascending_bars (only renders when COMPOSITION_MOTIF=ascending_bars) -->
    <div class="motif-variant ascending_bars">
    
    <div class="baseline"></div>
    <div class="bar bar-1"></div>
    <div class="bar bar-2"></div>
    <div class="bar bar-3"></div>
    <div class="bar bar-4"></div>
    <div class="bar bar-5"></div>
    <div class="bar bar-6"></div>
    <div class="bar bar-7"></div>
        </div>

    <!-- motif: threshold_line (only renders when COMPOSITION_MOTIF=threshold_line) -->
    <div class="motif-variant threshold_line">
    
    <div class="threshold"></div>
    <div class="crossing"></div>
    <div class="point"></div>
        </div>

    <!-- motif: marker_progression (only renders when COMPOSITION_MOTIF=marker_progression) -->
    <div class="motif-variant marker_progression">
    
    <div class="prog-dot pd-1"></div>
    <div class="prog-dot pd-2"></div>
    <div class="prog-dot pd-3"></div>
    <div class="prog-dot pd-4"></div>
    <div class="prog-dot pd-5"></div>
    <div class="prog-dot pd-6"></div>
    <div class="prog-dot pd-7"></div>
    <div class="point"></div>
        </div>

  </div>

  <div class="bracket tr"></div>
  <div class="bracket br"></div>

  <div class="gradient"></div>

  <div class="headline">
    <span class="line-1">{{HEADLINE_LINE_1}}</span>
    <span class="line-2">{{HEADLINE_LINE_2}}</span>
  </div>

  <div class="meta-bot">
    <span>{{POST_ID}} · WEEKLY MILESTONE</span>
    <span>{{VERSION_TAG}}</span>
  </div>

</div>

<script>
  // Headline auto-fit: if a line is wider than the available width at 64px,
  // scale font-size down proportionally until it fits. Keeps both lines
  // sized consistently (whichever needs shrinking more wins).
  (function autoFitHeadline() {
    var headline = document.querySelector('.headline');
    if (!headline) return;
    var lines = headline.querySelectorAll('.line-1, .line-2');
    var maxSize = 64;      // px — brand default
    var minSize = 40;      // px — floor, below this shrink the canvas instead
    var availableWidth = headline.clientWidth;  // container width minus padding
    var fitSize = maxSize;

    lines.forEach(function(line) {
      if (!line.textContent.trim()) return;
      // Temporarily remove overflow:hidden so we can measure true scrollWidth
      var originalOverflow = line.style.overflow;
      line.style.overflow = 'visible';
      var needed = line.scrollWidth;
      line.style.overflow = originalOverflow;
      if (needed > availableWidth) {
        var ratio = availableWidth / needed;
        var candidate = Math.floor(maxSize * ratio);
        if (candidate < fitSize) fitSize = candidate;
      }
    });

    fitSize = Math.max(minSize, Math.min(maxSize, fitSize));
    headline.style.fontSize = fitSize + 'px';
    // Proportionally adjust letter-spacing to keep tracking tight
    var spacing = -1.6 * (fitSize / maxSize);
    headline.style.letterSpacing = spacing.toFixed(2) + 'px';
  })();
</script>

</body>
</html>
